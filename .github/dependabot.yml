version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 15
    ignore:
      # Managed by `gh aw compile`; version-locked to the gh-aw compiler.
      - dependency-name: "github/gh-aw-actions/**"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 10
