---
name: 'Self-Healing CI - Scan'

on:
  schedule:
    # 02:00 UTC daily (12:00 AEST) - off-peak, deterministic timing.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: scan-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  scan:
    name: 'Detect failing checks'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Setup pnpm'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - name: 'Setup Node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 'Setup Python (for triage scripts)'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: 'Run typecheck'
        id: typecheck
        continue-on-error: true
        run: |
          # Use pipefail + PIPESTATUS[0] so the recorded exit code
          # reflects pnpm typecheck, not tee. Otherwise $? is always 0.
          set +e
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log
          rc=${PIPESTATUS[0]}
          set +o pipefail
          echo "exit=${rc}" >> "$GITHUB_OUTPUT"

      - name: 'Run lint'
        id: lint
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log
          rc=${PIPESTATUS[0]}
          set +o pipefail
          echo "exit=${rc}" >> "$GITHUB_OUTPUT"

      - name: 'Run vitest'
        id: test
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm test 2>&1 | tee test.log
          rc=${PIPESTATUS[0]}
          set +o pipefail
          echo "exit=${rc}" >> "$GITHUB_OUTPUT"

      - name: 'Collect failures'
        id: collect
        run: |
          set -euo pipefail
          # `pnpm test` runs both vitest and jest packages (@acme/nextjs
          # uses jest); parse the same log through both parsers so jest
          # failures are not silently dropped.
          failures=$(python scripts/collect_failures.py \
            vitest=test.log \
            jest=test.log \
            tsc=typecheck.log \
            eslint=lint.log)
          echo "count=$(echo "$failures" | python -c 'import json,sys; print(len(json.load(sys.stdin)))')" >> "$GITHUB_OUTPUT"
          printf '%s' "$failures" > failures.json
          echo "--- failures.json ---"
          cat failures.json

      - name: 'Upload failures artifact'
        if: steps.collect.outputs.count != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: failures
          path: failures.json
          retention-days: 14

      - name: 'Trigger triage'
        if: steps.collect.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/triage_failures.py < failures.json
