name: 'Build & Test'

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  build-test:
    name: 'Build & Test'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: 'Typecheck'
        run: pnpm turbo typecheck

      - name: 'Lint'
        continue-on-error: true
        run: pnpm turbo lint

      - name: 'Engine tests'
        run: pnpm --filter @acme/engine test

      - name: 'Build'
        run: pnpm --filter @acme/nextjs build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          AUTH_SECRET: 'ci-secret'
          AUTH_DISCORD_ID: 'ci-placeholder'
          AUTH_DISCORD_SECRET: 'ci-placeholder'
          DEV_BYPASS_AUTH: 'true'

  security-scan:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: 'Generate SBOM'
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json --output-format json

      - name: 'Grype vulnerability scan'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          sbom: sbom.json
          output-format: 'table'
          fail-build: 'false'
          config: '.grype.yaml'
