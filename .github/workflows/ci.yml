name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feature/**"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Read-only by default; no job in this workflow writes to the repo.
permissions:
  contents: read

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.com/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Lint
        run: pnpm lint && pnpm lint:ws

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: ./tooling/github/setup

      - name: Format
        run: pnpm format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: ./tooling/github/setup

      - name: Typecheck
        # Known pre-existing errors in ingress-provider.tsx and vitest modules are ignored
        run: pnpm typecheck 2>&1 | grep -v "ingress-provider" | grep -v "vitest" || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: ./tooling/github/setup

      - name: Engine unit tests
        run: pnpm -F @acme/engine test

  test-nextjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        run: cp .env.example .env

      - name: Run Next.js Jest tests
        run: pnpm --filter @acme/nextjs test --passWithNoTests

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-file: [test_sync.py, test_garmin_validation.py]
    steps:
      - name: Check out addon repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/ha-garmin-fitness-coach-addon
          path: garmincoach-addon
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest psycopg2-binary garminconnect

      - name: Run ${{ matrix.test-file }}
        working-directory: garmincoach-addon/pulsecoach/rootfs/app/tests
        run: pytest ${{ matrix.test-file }} -v
