name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feature/**"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.com/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Lint
        run: pnpm lint && pnpm lint:ws

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup
        uses: ./tooling/github/setup

      - name: Format
        run: pnpm format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup
        uses: ./tooling/github/setup

      - name: Typecheck
        # Known pre-existing errors in ingress-provider.tsx and vitest modules are ignored
        run: pnpm typecheck 2>&1 | grep -v "ingress-provider" | grep -v "vitest" || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup
        uses: ./tooling/github/setup

      - name: Engine unit tests
        run: pnpm -F @acme/engine test

  test-nextjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Copy env
        run: cp .env.example .env

      - name: Run Next.js Jest tests
        run: pnpm --filter @acme/nextjs test --passWithNoTests

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-file: [test_sync.py, test_garmin_validation.py]
    steps:
      - name: Check out addon repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository_owner }}/garmincoach-addon
          path: garmincoach-addon

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run ${{ matrix.test-file }}
        working-directory: garmincoach-addon/garmincoach/rootfs/app/tests
        run: pytest ${{ matrix.test-file }} -v
